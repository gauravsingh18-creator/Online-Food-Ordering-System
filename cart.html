<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" referrerpolicy="no-referrer" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="nav.css" />

</head>
<body>
    <!--header section-->
    <div class="header">
        <div class="container">
            <div class="nav_bar_1">
                <div class="logo">
                    <h3>BiteDash</h3>
                </div>
                <div class="nav">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="#">Contact</a></li>
                        <li><a href="#">About</a></li>
                    </ul>
                </div>
            </div>
            <div class="nav_bar_2">
                <div class="cart_icon">
                    <a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a>
                </div>
                <div class="sign_btn">
                    <a href="#">Sign In</a>
                </div>
            </div>
        </div>
    </div>
    <!--cart Section-->
    <div class="cart">
        <div class="cart_header">
            <h3>Checkout</h3>
            <p>Review your items and complete your order.</p>
        </div>
        <div class="container">
            <div class="cart_bar">
                <h3>Your Items</h3>
                <div class="cart_product" id="cart">
                    <!-- <div class="box">
                        <div class="img_box">
                            <img src="image/p1.png" alt="cart_img" />
                        </div>
                        <div class="detail">
                            <div class="info">
                                <h3>Truffle Double Burger</h3>
                                <p>Medium rare, no onions</p>
                            </div>
                            <div class="qty_sec">
                                <button>-</button>
                                <p>1</p>
                                <button>+</button>
                            </div>
                        </div>
                        <div class="edit_sec">
                            <div class="price">
                                <p>$89.56</p>
                            </div>
                            <div class="rmv_btn">
                                <button><i class="fa-solid fa-trash"></i> Remove</button>
                            </div>
                        </div>
                    </div> -->
                </div>
            </div>
            <div class="checkout_bar">
                <div class="summary_box">
                    <div class="box">
                        <h3>Summary</h3>
                        <div class="price_calculate">
                            <div class="subtotal">
                                <p>Subtotal</p>
                                <p id="subtotal"></p>
                            </div>
                            <div class="delivery">
                                <p>Delivery Fee</p>
                                <p id="delivery"></p>
                            </div>
                            <div class="tax">
                                <p>Tax</p>
                                <p id="tax"></p>
                            </div>
                        </div>
                        <div class="total">
                            <p>Total</p>
                            <p id="total"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--Footer Section-->
    <div class="footer">
        <div class="contant">
            <p>© 2026 BiteDash. High-Definition Hospitality.</p>
        </div>
    </div>
<script src="cart.js"></script>
</body>
</html>
