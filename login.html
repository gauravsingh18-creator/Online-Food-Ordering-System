<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
       *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background: url("bgc.png") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            flex-direction:column;
            position:relative;
        }

        body::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(255,255,255,0.75);
            z-index:0;
        }

        .main{
            position:relative;
            z-index:1;
            width:430px;
            background:rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            padding:35px;
        }

        .cname{
            text-align:center;
            color:#b33900;
            font-size:48px;
            font-weight:bold;
            font-family:Georgia, 'Times New Roman', Times, serif;
        }

        .des{
            text-align:center;
            color:#645656;
            margin-top:10px;
            margin-bottom:35px;
            font-size:20px;
            font-family:Georgia, 'Times New Roman', Times, serif;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:8px;
        }

        input[type=email],
        input[type=password]{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:8px;
            background-color: #fff8f6;
            margin-bottom:20px;
            font-size:16px;
            outline:none;
        }

        input:focus{
            border-color:#b33900;
        }

        .password{
            display:flex;
            justify-content:space-between;
        }

        .password a{
            text-decoration:none;
            color:#b33900;
            font-size:14px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:8px;
            background:#aa3500;
            color:white;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            border: 1px solid #a62e02;
            background-color: #fff;
            color: #b33900;
            transition: 0.3s;
        }

        .signup{
            text-align:center;
            margin-top:30px;
            font-size:17px;
        }

        .signup a{
            color:#b33900;
            text-decoration:none;
            font-weight:bold;
            cursor: pointer;
        }

        footer{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background: rgba(39, 28, 26, 1);
            color:#f5caca;
            text-align:center;
            padding:18px;
            font-size:16px;
            z-index: 1;
        }

        @media(max-width:500px){

        .main{
            width:90%;
        }

        .cname{
            font-size:38px;
        }

        .des{
            font-size:17px;
        }

        }
    </style>
</head>
<body>

<div class="main">

    <h1 class="cname">BiteDash</h1>

    <p class="des">High-Definition Hospitality</p>

    <form>

        <label>Email Address</label>

        <input type="email" placeholder="📩 name@example.com" required>

        <div class="password">
            <label>Password</label>
            <a href="#">Forgot Password?</a>
        </div>

        <input type="password" placeholder="🔒 Enter Password" required>

        <button type="submit">
            Login →
        </button>

    </form>

    <div class="signup">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </div>

</div>

<footer>
    © 2024 BiteDash. High-Definition Hospitality.
</footer>

</body>
</html>
